services:
  app:
    image: techrecruit:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      WAIT_FOR_DB: "1"
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - techrecruit_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/login > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: techrecruit:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      WAIT_FOR_DB: "1"
    command: >
      sh -lc "while true; do
      php bin/process_campaign_queue.php --limit=$${CAMPAIGN_QUEUE_BATCH_SIZE:-25} --operator=docker-worker;
      sleep $${WORKER_INTERVAL_SECONDS:-15};
      done"
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - techrecruit_storage:/var/www/html/storage

  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    env_file:
      - .env.docker
    volumes:
      - techrecruit_db:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

volumes:
  techrecruit_storage:
  techrecruit_db:
