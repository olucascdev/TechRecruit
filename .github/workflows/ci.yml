name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "hotfix/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, gd, mbstring, pdo_mysql, xml, zip
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint PHP source files
        run: bash scripts/ci/php-lint.sh

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build CSS assets
        run: npm run build:css

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs:
      - php-lint
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --pull --tag techrecruit:ci .
